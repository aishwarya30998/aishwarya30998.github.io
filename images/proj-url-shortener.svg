<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <circle cx="470" cy="70" r="120" fill="url(#glow)"/>
  <circle cx="110" cy="285" r="100" fill="url(#glow)"/>

  <!-- Long URL input -->
  <rect x="108" y="62" width="175" height="36" rx="7" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1.5" opacity="0.85"/>
  <text x="118" y="77" font-family="monospace, sans-serif" font-size="8" fill="#64748b">https://very-long-url.com/</text>
  <text x="118" y="90" font-family="monospace, sans-serif" font-size="8" fill="#64748b">deep/path?query=value</text>

  <!-- Arrow -->
  <path d="M286 80 L316 80" stroke="#10b981" stroke-width="2.5" opacity="0.7"/>
  <path d="M312 74 L322 80 L312 86" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.7"/>

  <!-- FastAPI + Pydantic center box -->
  <rect x="326" y="55" width="160" height="55" rx="8" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="2" opacity="0.9"/>
  <text x="406" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7" font-weight="700">FastAPI</text>
  <text x="406" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Pydantic · SQLAlchemy · Uvicorn</text>
  <text x="406" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">schemas.py · crud.py · keygen.py</text>

  <!-- Short URL output -->
  <rect x="108" y="125" width="140" height="36" rx="7" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="1.5" opacity="0.85"/>
  <text x="118" y="140" font-family="monospace, sans-serif" font-size="9" fill="#6ee7b7">short.ly/<tspan font-weight="700" fill="#34d399">aB3xK9</tspan></text>
  <text x="118" y="154" font-family="monospace, sans-serif" font-size="8" fill="#10b981">← shortened + tracked ✓</text>

  <!-- Pydantic schema box -->
  <rect x="370" y="125" width="140" height="58" rx="7" fill="rgba(99,102,241,0.08)" stroke="#6366f1" stroke-width="1.5" opacity="0.8"/>
  <text x="380" y="141" font-family="monospace, sans-serif" font-size="8" fill="#8b5cf6" font-weight="600">class URLBase(BaseModel):</text>
  <text x="380" y="154" font-family="monospace, sans-serif" font-size="8" fill="#64748b">  url: AnyHttpUrl</text>
  <text x="380" y="167" font-family="monospace, sans-serif" font-size="8" fill="#64748b">  key: str</text>
  <text x="380" y="178" font-family="monospace, sans-serif" font-size="8" fill="#64748b">  clicks: int</text>

  <!-- SQLite box -->
  <rect x="108" y="182" width="95" height="28" rx="6" fill="rgba(6,182,212,0.08)" stroke="#06b6d4" stroke-width="1.5" opacity="0.75"/>
  <text x="155" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#67e8f9" font-weight="600">SQLite · ORM</text>

  <!-- Lines -->
  <line x1="247" y1="143" x2="370" y2="143" stroke="#6366f1" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="196" y1="161" x2="196" y2="182" stroke="#06b6d4" stroke-width="1" opacity="0.35" stroke-dasharray="3,3"/>

  <!-- Title -->
  <text x="300" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">URL Shortener API</text>
  <text x="300" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">FastAPI · Pydantic · SQLAlchemy · Click Analytics</text>

  <!-- Tech pills -->
  <rect x="100" y="270" width="70" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <text x="135" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">FastAPI</text>
  <rect x="180" y="270" width="75" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="217" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Pydantic</text>
  <rect x="265" y="270" width="90" height="24" rx="12" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="310" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#67e8f9">SQLAlchemy</text>
  <rect x="365" y="270" width="60" height="24" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="395" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">Uvicorn</text>
  <rect x="435" y="270" width="60" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="465" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Python</text>
</svg>
