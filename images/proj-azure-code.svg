<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <circle cx="480" cy="65" r="120" fill="url(#glow)"/>
  <circle cx="110" cy="290" r="95" fill="url(#glow)"/>
  <!-- Code editor window -->
  <rect x="140" y="55" width="200" height="140" rx="8" fill="rgba(15,23,42,0.8)" stroke="#0078d4" stroke-width="1.5" opacity="0.85"/>
  <!-- Window title bar -->
  <rect x="140" y="55" width="200" height="22" rx="8" fill="rgba(0,120,212,0.15)"/>
  <circle cx="155" cy="66" r="4" fill="#ef4444" opacity="0.7"/>
  <circle cx="168" cy="66" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="181" cy="66" r="4" fill="#10b981" opacity="0.7"/>
  <text x="240" y="69" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">code_generator.py</text>
  <!-- Code lines -->
  <text x="155" y="93" font-family="monospace, sans-serif" font-size="9" fill="#8b5cf6">def</text>
  <text x="177" y="93" font-family="monospace, sans-serif" font-size="9" fill="#67e8f9">generate_code</text>
  <text x="155" y="107" font-family="monospace, sans-serif" font-size="9" fill="#64748b">  prompt =</text>
  <text x="208" y="107" font-family="monospace, sans-serif" font-size="9" fill="#f59e0b" font-style="italic">"..."</text>
  <text x="155" y="121" font-family="monospace, sans-serif" font-size="9" fill="#64748b">  response =</text>
  <text x="155" y="135" font-family="monospace, sans-serif" font-size="9" fill="#a5b4fc">    azure_client</text>
  <text x="155" y="149" font-family="monospace, sans-serif" font-size="9" fill="#a5b4fc">    .complete()</text>
  <text x="155" y="163" font-family="monospace, sans-serif" font-size="9" fill="#6ee7b7">  return code</text>
  <!-- Azure badge -->
  <rect x="375" y="65" width="100" height="60" rx="8" fill="rgba(0,120,212,0.1)" stroke="#0078d4" stroke-width="2" opacity="0.9"/>
  <text x="425" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#60a5fa" font-weight="700">Azure AI</text>
  <text x="425" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">OpenAI</text>
  <text x="425" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0078d4">GPT-4</text>
  <!-- Connection arrow -->
  <path d="M340" y="120"/>
  <line x1="342" y1="120" x2="374" y2="95" stroke="#0078d4" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="300" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">Code Generation — Azure AI</text>
  <text x="300" y="246" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Azure OpenAI · GPT-4 Code Completion</text>
  <!-- Tech pills -->
  <rect x="120" y="268" width="90" height="24" rx="12" fill="rgba(0,120,212,0.15)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>
  <text x="165" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa">Azure OpenAI</text>
  <rect x="220" y="268" width="95" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="267" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Code Gen</text>
  <rect x="325" y="268" width="75" height="24" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="362" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">GPT-4</text>
  <rect x="410" y="268" width="60" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="440" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Python</text>
</svg>
