<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <circle cx="500" cy="60" r="130" fill="url(#glow)"/>
  <circle cx="100" cy="290" r="100" fill="url(#glow)"/>
  <!-- MCP Server Node (center) -->
  <rect x="255" y="60" width="90" height="55" rx="8" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
  <text x="300" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#a5b4fc" font-weight="600">MCP SERVER</text>
  <text x="300" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6366f1">Orders · Tickets · KB</text>
  <!-- Planner Agent (left) -->
  <rect x="120" y="70" width="80" height="38" rx="6" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c4b5fd" font-weight="600">PLANNER</text>
  <text x="160" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#8b5cf6">Agent</text>
  <!-- Support Agent (right) -->
  <rect x="400" y="70" width="80" height="38" rx="6" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>
  <text x="440" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#67e8f9" font-weight="600">EXECUTOR</text>
  <text x="440" y="99" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#06b6d4">Agent</text>
  <!-- Connection lines -->
  <line x1="200" y1="89" x2="255" y2="89" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
  <line x1="345" y1="89" x2="400" y2="89" stroke="#06b6d4" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
  <!-- SQLite DB below -->
  <ellipse cx="300" cy="158" rx="35" ry="10" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <rect x="265" y="158" width="70" height="22" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="300" cy="180" rx="35" ry="10" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <text x="300" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7">SQLite</text>
  <!-- Line to DB -->
  <line x1="300" y1="115" x2="300" y2="148" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <!-- Title -->
  <text x="300" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#f1f5f9">Customer Support Agent</text>
  <text x="300" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">MCP + Multi-Agent Architecture</text>
  <!-- Tech pills -->
  <rect x="110" y="268" width="45" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="132" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">MCP</text>
  <rect x="165" y="268" width="90" height="24" rx="12" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="210" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">Multi-Agent</text>
  <rect x="265" y="268" width="90" height="24" rx="12" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="310" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#67e8f9">Anthropic SDK</text>
  <rect x="365" y="268" width="55" height="24" rx="12" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="392" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7">SQLite</text>
  <rect x="430" y="268" width="60" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="460" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Python</text>
</svg>
