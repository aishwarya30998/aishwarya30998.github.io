  <text x="267" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Streamlit</text>
  <rect x="315" y="265" width="80" height="24" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="355" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fcd34d">Multimodal</text>
  <rect x="405" y="265" width="60" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="435" y="281" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Python</text>
