  <path d="M403" y1="120" x2="430" y2="120"/>
  <line x1="403" y1="120" x2="430" y2="120" stroke="#10b981" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <!-- Title -->
  <text x="300" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="700" fill="#f1f5f9">Multilanguage Invoice Extractor</text>
