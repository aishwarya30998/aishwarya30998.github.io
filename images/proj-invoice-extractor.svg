  <text x="365" y="126" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#8b5cf6">Vision Pro</text>
  <!-- Eye icon inside circle -->
  <ellipse cx="365" cy="138" rx="10" ry="6" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="365" cy="138" r="3" fill="#8b5cf6" opacity="0.5"/>
