  <text x="167" y="152" font-family="system-ui, sans-serif" font-size="8" fill="#a5b4fc" opacity="0.6">EN · ES · FR · DE</text>
  <!-- Arrow -->
  <path d="M270 120 L310 120" stroke="#06b6d4" stroke-width="2.5" opacity="0.7"/>
  <path d="M305 114 L315 120 L305 126" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.7"/>
