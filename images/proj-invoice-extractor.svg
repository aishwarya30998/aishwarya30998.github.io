  <rect x="430" y="90" width="90" height="60" rx="6" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <text x="475" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6ee7b7" font-weight="600">Extracted</text>
