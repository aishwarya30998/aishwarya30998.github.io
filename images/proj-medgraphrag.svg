<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)" rx="12"/>
  <circle cx="480" cy="70" r="120" fill="url(#glow)"/>
  <circle cx="130" cy="270" r="90" fill="url(#glow)"/>
  <!-- Graph nodes -->
  <circle cx="300" cy="100" r="22" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.85"/>
  <text x="300" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#c4b5fd" font-weight="600">Disease</text>
  <circle cx="195" cy="150" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <text x="195" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#67e8f9">Drug</text>
  <circle cx="405" cy="150" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
  <text x="405" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#67e8f9">Symptom</text>
  <circle cx="260" cy="170" r="16" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <text x="260" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#6ee7b7">Gene</text>
  <circle cx="340" cy="170" r="16" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <text x="340" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#6ee7b7">Protein</text>
  <!-- Graph edges -->
  <line x1="278" y1="113" x2="213" y2="137" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="322" y1="113" x2="387" y2="137" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="213" y1="155" x2="244" y2="162" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="387" y1="155" x2="356" y2="162" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="276" y1="170" x2="324" y2="170" stroke="#10b981" stroke-width="1" opacity="0.4"/>
  <!-- Cross symbol (medical) -->
  <rect x="450" y="80" width="8" height="30" rx="2" fill="#ef4444" opacity="0.6"/>
  <rect x="439" y="91" width="30" height="8" rx="2" fill="#ef4444" opacity="0.6"/>
  <!-- Title -->
  <text x="300" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">MedGraphRAG</text>
  <text x="300" y="248" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">Medical Knowledge Graph + RAG</text>
  <!-- Tech pills -->
  <rect x="130" y="270" width="95" height="24" rx="12" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="177" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c4b5fd">Knowledge Graph</text>
  <rect x="235" y="270" width="45" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="257" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">RAG</text>
  <rect x="290" y="270" width="70" height="24" rx="12" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="325" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#67e8f9">Medical AI</text>
  <rect x="370" y="270" width="60" height="24" rx="12" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="400" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Python</text>
</svg>
